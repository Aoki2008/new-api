name: Build Docker image (one-click GHCR)

on:
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          TAG="manual-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          REPOSITORY="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPOSITORY}"

          echo "$TAG" > VERSION
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=latest

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### Image published"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Image: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`"
            echo "- Also pushed: \`${{ steps.vars.outputs.image }}:latest\`"
            echo "- Platforms: \`linux/amd64,linux/arm64\`"
          } >> "$GITHUB_STEP_SUMMARY"
