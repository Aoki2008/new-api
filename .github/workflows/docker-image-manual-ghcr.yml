name: Build Docker image (manual GHCR)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or commit SHA)'
        required: false
        default: 'main'
        type: string
      image_tag:
        description: 'Image tag to publish (defaults to manual-YYYYMMDD-SHA)'
        required: false
        type: string
      platforms:
        description: 'Target platforms'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      latest:
        description: 'Also publish ghcr.io/<repo>:latest'
        required: false
        default: false
        type: boolean

jobs:
  build_and_push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          TAG_INPUT="${{ inputs.image_tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="manual-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi

          REPOSITORY="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPOSITORY}"

          echo "$TAG" > VERSION
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### Image published"
            echo ""
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo "- Image: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}\`"
            echo "- Platforms: \`${{ inputs.platforms }}\`"
            echo "- Latest: \`${{ inputs.latest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
